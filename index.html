<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكالمات الأطفال - حماية من التحميل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            overflow-x: hidden;
            touch-action: manipulation;
            user-select: none; /* منع تحديد النصوص */
            -webkit-user-select: none;
        }
        .character-card:active { transform: scale(0.95); }
        .call-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 50;
            background: #1a1a1a;
            color: white;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
        }
        .avatar-container {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid white;
            overflow: hidden;
        }
        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* منع قائمة السياق (رايت كليك) على الصور */
        img { pointer-events: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen" oncontextmenu="return false;"> <!-- منع القائمة اليمنى تماماً -->

    <header class="bg-yellow-400 p-6 text-center shadow-lg">
        <h1 class="text-4xl font-black text-purple-700">مكالمات الأصدقاء 📞</h1>
    </header>

    <main class="container mx-auto p-8">
        <div id="character-list" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- البطاقات -->
        </div>
    </main>

    <div id="call-screen" class="call-screen">
        <div class="text-center">
            <div id="call-avatar" class="avatar-container mx-auto mb-4">
                <img id="calling-img" src="" alt="">
            </div>
            <h2 id="call-name" class="text-3xl font-bold"></h2>
            <p id="call-status" class="text-green-400 text-xl mt-2">يتصل...</p>
        </div>

        <div class="flex justify-around w-full max-w-sm mb-20">
            <button id="btn-answer" onclick="answerCall()" class="bg-green-500 p-6 rounded-full shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                </svg>
            </button>
            <button onclick="endCall()" class="bg-red-500 p-6 rounded-full shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M5 3a2 2 0 00-2 2v1c0 8.284 6.716 15 15 15h1a2 2 0 002-2v-3.28a1 1 0 00-.684-.948l-4.493-1.498a1 1 0 00-1.21.502l-1.13 2.257a11.042 11.042 0 01-5.516-5.516l2.257-1.13a1 1 0 00.502-1.21L9.228 3.684A1 1 0 008.28 3H5z" />
                </svg>
            </button>
        </div>
    </div>

    <!-- مشغلات صوت مخفية تماماً بدون أي عناصر تحكم -->
    <audio id="ringtone" loop src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3" controlsList="nodownload" oncontextmenu="return false;"></audio>
    <audio id="character-audio" controlsList="nodownload" oncontextmenu="return false;"></audio>

    <script>
        const characters = [
            { id: 1, name: "فوزي موزي", imageUrl: "fwzy.jpg", voice: "fwzy.mp3", color: "bg-yellow-100", border: "border-yellow-400" },
            { id: 2, name: "توتي", imageUrl: "toty.jpg", voice: "toty.mp3", color: "bg-red-100", border: "border-red-400" }
        ];

        const characterList = document.getElementById('character-list');
        const callScreen = document.getElementById('call-screen');
        const ringtone = document.getElementById('ringtone');
        const characterAudio = document.getElementById('character-audio');
        const callStatus = document.getElementById('call-status');
        const btnAnswer = document.getElementById('btn-answer');

        characters.forEach(char => {
            const card = document.createElement('div');
            card.className = `${char.color} ${char.border} border-4 rounded-3xl p-4 text-center shadow-xl cursor-pointer character-card`;
            card.innerHTML = `
                <div class="w-24 h-24 mx-auto mb-3 rounded-full overflow-hidden border-2 border-white pointer-events-none">
                    <img src="${char.imageUrl}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/100'">
                </div>
                <h3 class="text-xl font-bold text-gray-800">${char.name}</h3>
                <button class="mt-2 bg-green-500 text-white px-4 py-1 rounded-full text-sm font-bold">اتصل</button>
            `;
            card.onclick = () => startCall(char);
            characterList.appendChild(card);
        });

        // ميزة لمنع التحميل: تحويل الرابط لـ Blob عند التشغيل
        async function playWithoutDownload(audioElement, url) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);
                audioElement.src = blobUrl;
                audioElement.load();
                return true;
            } catch (e) {
                // إذا فشل الـ Blob (بسبب CORS)، نستخدم الرابط المباشر كحل أخير
                audioElement.src = url;
                audioElement.load();
                return false;
            }
        }

        function startCall(char) {
            document.getElementById('call-name').innerText = char.name;
            document.getElementById('calling-img').src = char.imageUrl;
            
            // تحميل الصوت في الخلفية بطريقة الـ Blob
            playWithoutDownload(characterAudio, char.voice);

            callScreen.style.display = 'flex';
            callStatus.innerText = "يتصل بك الآن...";
            btnAnswer.style.display = 'block';
            
            ringtone.play().catch(() => {});
        }

        function answerCall() {
            ringtone.pause();
            ringtone.currentTime = 0;
            btnAnswer.style.display = 'none';
            callStatus.innerText = "متصل...";

            characterAudio.play().catch(error => {
                console.log("Error: " + error);
                callStatus.innerText = "حدث خطأ في الصوت";
            });
        }

        function endCall() {
            ringtone.pause();
            characterAudio.pause();
            characterAudio.currentTime = 0;
            // تنظيف الذاكرة من روابط الـ Blob
            if (characterAudio.src.startsWith('blob:')) {
                URL.revokeObjectURL(characterAudio.src);
            }
            callScreen.style.display = 'none';
        }
    </script>
</body>
</html>
